
---
- name: Stop PgBouncer service
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Try to stop PgBouncer gracefully
      shell: timeout 60 systemctl stop pgbouncer
      register: stop_result
      ignore_errors: true
      changed_when: true

    - name: Show stop result
      debug:
        var: stop_result

    - name: Force kill PgBouncer if graceful stop failed
      shell: |
        systemctl kill --kill-who=all pgbouncer || true
        pkill -TERM pgbouncer || true
        sleep 5
        pkill -KILL pgbouncer || true
      when: stop_result.rc != 0
      changed_when: true

    - name: Reset failed PgBouncer systemd state
      shell: systemctl reset-failed pgbouncer || true
      changed_when: false

    - name: Check if PgBouncer process is still running
      shell: pgrep -x pgbouncer || true
      register: pgbouncer_pid
      changed_when: false

    - name: Show PgBouncer PID check
      debug:
        msg: >-
          {% if pgbouncer_pid.stdout != "" %}
          PgBouncer is still running with PID: {{ pgbouncer_pid.stdout }}
          {% else %}
          PgBouncer process is stopped.
          {% endif %}

    - name: Fail if PgBouncer process is still running
      fail:
        msg: "PgBouncer process is still running. Manual check required."
      when: pgbouncer_pid.stdout != ""
