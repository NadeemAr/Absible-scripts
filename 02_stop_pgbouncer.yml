
---
- name: Stop PgBouncer service
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Try graceful stop with timeout
      shell: timeout 30 systemctl stop pgbouncer
      register: stop_result
      ignore_errors: true

    - name: Show graceful stop result
      debug:
        var: stop_result

    - name: Force kill PgBouncer through systemd if stop failed
      shell: |
        systemctl kill --kill-who=all pgbouncer || true
        pkill -TERM pgbouncer || true
        sleep 5
        pkill -KILL pgbouncer || true
      when: stop_result.rc != 0

    - name: Reset failed PgBouncer state
      shell: systemctl reset-failed pgbouncer || true
      changed_when: false

    - name: Check PgBouncer status
      shell: systemctl is-active pgbouncer || true
      register: pgbouncer_status
      changed_when: false

    - name: Show PgBouncer status
      debug:
        msg: "PgBouncer status is {{ pgbouncer_status.stdout }}"

    - name: Fail if PgBouncer is still active
      fail:
        msg: "PgBouncer is still running. Manual check required."
      when: pgbouncer_status.stdout == "active"
