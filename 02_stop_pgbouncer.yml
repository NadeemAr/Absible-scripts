
---
- name: Stop PgBouncer
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Kill PgBouncer if running
      shell: |
        PIDS=$(pgrep -x pgbouncer || true)
        if [ -n "$PIDS" ]; then
          kill -TERM $PIDS || true
          sleep 5
          kill -9 $PIDS || true
        fi
      changed_when: true

    - name: Verify PgBouncer process is stopped
      shell: pgrep -x pgbouncer || true
      register: final_check
      changed_when: false

    - name: Fail if PgBouncer is still running
      fail:
        msg: "PgBouncer is still running."
      when: final_check.stdout != ""
