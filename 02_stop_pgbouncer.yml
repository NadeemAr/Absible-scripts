---
- name: Stop PgBouncer service safely
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Get PgBouncer MainPID from systemd
      shell: systemctl show pgbouncer -p MainPID --value
      register: pgbouncer_mainpid
      changed_when: false

    - name: Show MainPID
      debug:
        msg: "PgBouncer MainPID is {{ pgbouncer_mainpid.stdout }}"

    - name: Try graceful kill using systemd
      shell: |
        systemctl kill --signal=SIGTERM --kill-who=main pgbouncer || true
        sleep 10
      changed_when: true

    - name: Check if PgBouncer process still exists
      shell: pgrep -a pgbouncer || true
      register: pgbouncer_check_1
      changed_when: false

    - name: Show PgBouncer process after SIGTERM
      debug:
        msg: "{{ pgbouncer_check_1.stdout | default('No PgBouncer process running') }}"

    - name: Force kill PgBouncer if still running
      shell: |
        pkill -KILL pgbouncer || true
        sleep 5
      when: pgbouncer_check_1.stdout != ""
      changed_when: true

    - name: Reset failed state
      shell: systemctl reset-failed pgbouncer || true
      changed_when: false

    - name: Final process check
      shell: pgrep -a pgbouncer || true
      register: final_pgbouncer_check
      changed_when: false

    - name: Show final PgBouncer process status
      debug:
        msg: >-
          {% if final_pgbouncer_check.stdout != "" %}
          PgBouncer is still running: {{ final_pgbouncer_check.stdout }}
          {% else %}
          PgBouncer process is stopped.
          {% endif %}

    - name: Fail only if PgBouncer process is still running
      fail:
        msg: "PgBouncer process is still running. Manual check required."
      when: final_pgbouncer_check.stdout != ""
