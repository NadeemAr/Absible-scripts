---
- name: Stop PgBouncer hard stop
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Show current PgBouncer process
      shell: ps -ef | grep '[p]gbouncer'
      register: before_process
      ignore_errors: true
      changed_when: false

    - name: Display current process
      debug:
        var: before_process.stdout_lines

    - name: Disable PgBouncer so it does not restart
      systemd:
        name: pgbouncer
        enabled: false

    - name: Mask PgBouncer temporarily
      command: systemctl mask pgbouncer
      changed_when: true
      ignore_errors: true

    - name: Kill exact PgBouncer PID
      shell: |
        PIDS=$(pgrep -f "/usr/bin/pgbouncer")
        if [ -n "$PIDS" ]; then
          kill -TERM $PIDS || true
          sleep 5
          kill -KILL $PIDS || true
        fi
      changed_when: true

    - name: Wait until PgBouncer process is gone
      shell: pgrep -f "/usr/bin/pgbouncer" || true
      register: pgbouncer_pid_check
      retries: 10
      delay: 3
      until: pgbouncer_pid_check.stdout == ""
      changed_when: false

    - name: Reset failed systemd state
      command: systemctl reset-failed pgbouncer
      changed_when: false
      ignore_errors: true

    - name: Final PgBouncer process check
      shell: ps -ef | grep '[p]gbouncer' || true
      register: final_check
      changed_when: false

    - name: Show final status
      debug:
        msg: >-
          {% if final_check.stdout == "" %}
          PgBouncer process is stopped.
          {% else %}
          PgBouncer is still running: {{ final_check.stdout }}
          {% endif %}

    - name: Fail if PgBouncer is still running
      fail:
        msg: "PgBouncer is still running. Check if another service or watchdog is restarting it."
      when: final_check.stdout != ""
